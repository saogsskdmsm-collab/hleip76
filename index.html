<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Web API Test</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding-top:100px;
}

button{
padding:15px 35px;
font-size:18px;
border:none;
background:#22c55e;
color:white;
cursor:pointer;
border-radius:8px;
}

#log{
margin-top:30px;
background:#111827;
padding:20px;
width:80%;
margin-left:auto;
margin-right:auto;
text-align:left;
white-space:pre-line;
}
</style>
</head>

<body>

<h1>مشاهدة فيديو</h1>
<p>اضغط الزر لتجربة ميزات المتصفح</p>

<button onclick="runAll()">اضغط هنا</button>

<div id="log"></div>

<script>

function log(t){
document.getElementById("log").innerText += t + "\n";
}

async function runAll(){

log("=== Device Info ===");
log(navigator.userAgent);
log("Language: " + navigator.language);
log("Platform: " + navigator.platform);

log("\n=== Screen ===");
log(screen.width + "x" + screen.height);

if(navigator.vibrate){
navigator.vibrate(300);
log("Vibration executed");
}

if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(p=>{
log("Location: " + p.coords.latitude + "," + p.coords.longitude);
});
}

if(navigator.mediaDevices){
try{
await navigator.mediaDevices.getUserMedia({video:true,audio:true});
log("Camera/Mic permission requested");
}catch(e){
log("Camera/Mic denied");
}
}

if(navigator.clipboard){
log("Clipboard API available");
}

if('serviceWorker' in navigator){
log("Service Worker supported");
}

if('Notification' in window){
log("Notification API available");
}

if(navigator.connection){
log("Network type: " + navigator.connection.effectiveType);
}

if('indexedDB' in window){
log("IndexedDB supported");
}

log("\n=== Canvas Test ===");

var canvas=document.createElement("canvas");
var ctx=canvas.getContext("2d");
ctx.fillText("Test",10,10);
log("Canvas rendered");

log("\n=== Fetch Test ===");

fetch("https://api.ipify.org?format=json")
.then(r=>r.json())
.then(d=>log("Public IP: "+d.ip))
.catch(()=>log("Fetch failed"));

}

</script>

</body>
</html>
