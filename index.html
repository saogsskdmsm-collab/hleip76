<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اختبار الجهد الأقصى - Extreme Benchmark</title>
    <style>
        body { background: #000; color: #ff3333; font-family: sans-serif; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; height: 80vh; gap: 5px; }
        iframe { width: 100%; height: 100%; border: 1px solid #ff3333; }
        .warning { padding: 10px; border: 2px solid red; margin: 10px; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }
    </style>
</head>
<body>

    <div class="warning">
        تحذير: هذا الاختبار سيستهلك 100% من موارد الجهاز. قد يتوقف الجهاز عن الاستجابة أو ينطفئ.
    </div>

    <div class="grid">
        <iframe src="https://volumeshaderbm.com/start/"></iframe>
        <iframe src="https://volumeshaderbm.com/start/"></iframe>
        <iframe src="https://testdrive-archive.azurewebsites.net/performance/fishbowl/"></iframe>
        <iframe src="https://www.wirple.com/bunnymark/"></iframe>
    </div>

    <script>
        // كود إضافي لضغط المعالج (CPU) عن طريق حسابات لا نهائية
        function stressCPU() {
            console.log("بدء ضغط المعالج...");
            while (true) {
                Math.sqrt(Math.random() * Math.random());
                // هذه الحلقة اللانهائية ستجمد المتصفح تماماً وتجعل المعالج يعمل بأقصى طاقته
            }
        }

        // ملاحظة: المتصفحات الحديثة قد تمنع الحلقة اللانهائية، لذا سنستخدم Worker إذا أردت ضغطاً حقيقياً
        // لتفعيل الضغط الكامل على المعالج، اضغط على الزر أدناه (سيجمد الصفحة فوراً)
    </script>
    
    <button onclick="stressCPU()" style="padding: 15px; background: red; color: white; font-weight: bold; cursor: pointer;">
        بدء ضغط المعالج (تجميد المتصفح)
    </button>

</body>
</html>
